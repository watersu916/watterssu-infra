apiVersion:apps/v1
kind: Deployment
metadata:
  name: watterssu-frontend
  namespace: portfolio
  labels:
    app: watterssu-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: watterssu-frontend
  template:
    metadata:
      labels:
        app: watterssu-frontend
    spec:
      containers:
      - name: frontend
        image: watersu916/watterssu-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: watterssu-frontend-service
  namespace: portfolio
spec:
  selector:
    app: watterssu-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
